name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Required from June 16 2026

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2           # Node.js 24 compatible

    - name: Set up JDK 21
      uses: actions/setup-java@v4.7.0         # Node.js 24 compatible; JDK 21 for AGP 9.x
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Create .env file from GitHub Secrets
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
        echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> .env
        echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
        echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
        echo "MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}" >> .env
        echo "GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env

    - name: Grant execute permission for gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --no-daemon --stacktrace
        else
          gradle assembleDebug --no-daemon --stacktrace
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4.6.0    # Node.js 24 compatible
      with:
        name: fixnow-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
